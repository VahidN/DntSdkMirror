name: .NET Core Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
            dotnet-version: 10.0.x

      - name: Run Project
        run: dotnet run --project ./src/DntSdkMirror/DntSdkMirror.csproj

      - name: Find sdks folder
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "Searching for sdks folder..."
          find . -type d -name "sdks"
          echo "Searching for any .exe files..."
          find . -name "*.exe"
    
      - name: Copy sdks to root
        run: |
          find src -type d -name "sdks" -exec cp -r {} ./sdks \;
          if [ -d "src/DntSdkMirror/bin/Debug/net10.0/home/runner/work/DntSdkMirror/DntSdkMirror/sdks" ]; then
            cp -r src/DntSdkMirror/bin/Debug/net10.0/home/runner/work/DntSdkMirror/DntSdkMirror/sdks ./sdks
          fi
        continue-on-error: true
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git add sdks/
          git diff --staged --quiet || git commit -m "Update SDKs at $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
