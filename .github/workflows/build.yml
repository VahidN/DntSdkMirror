name: .NET Core Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
            dotnet-version: 10.0.x

      - name: Run Project
        run: dotnet run --project ./src/DntSdkMirror/DntSdkMirror.csproj

      - name: List files
        run: ls -la
  
      - name: Push changes to repo          
        run: |      
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./sdks/
          git diff --staged --quiet || git commit -m "Automated update at $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
