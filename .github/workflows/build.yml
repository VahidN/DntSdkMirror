name: .NET Core Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
            dotnet-version: 10.0.x

      - name: Run Project
        run: dotnet run --project ./src/DntSdkMirror/DntSdkMirror.csproj
          
      - uses: actions/upload-artifact@v4
        with:
             name: all-downloaded-files
             path: sdks/   # کل محتویات این پوشه (با زیرپوشه‌ها) در یک artifact قرار می‌گیرد
             retention-days: 7

      - name: Get all artifact links and save to file
        run: |
            sleep 5  # کمی صبر تا Artifactها ثبت شوند
            # دریافت لیست تمام Artifactهای این Run
            ARTIFACTS_JSON=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)
            # استخراج name و id هر Artifact
            echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | "\(.name)|\(.id)"' > artifacts_list.txt

            # ایجاد یا بازنویسی فایل latest-download-link.txt
            > latest-download-link.txt

            while IFS='|' read -r name id; do
              LINK="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$id"
              echo "$name: $LINK" >> latest-download-link.txt
            done < artifacts_list.txt

            # (اختیاری) نمایش محتوا در لاگ
            cat latest-download-link.txt
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push the link file
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add latest-download-link.txt
            git diff --staged --quiet || git commit -m "Update latest download links ($(date -u +'%Y-%m-%d'))"
            git push
