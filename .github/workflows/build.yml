name: .NET Core Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
            dotnet-version: 10.0.x

      - name: Run Project
        run: dotnet run --project ./src/DntSdkMirror/DntSdkMirror.csproj
          
      - name: Push changes to repo          
        run: |      
      - name: Commit and push the link file
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --staged --quiet || git commit -m "Update latest download links ($(date -u +'%Y-%m-%d'))"
            git push
